name: Deploy Stacks
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  Deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run Ansible Playbook - core-playbook.yaml
        env:
          VAULT: ${{ secrets.ANSIBLE_VAULT }}
          VAULT_PASS: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        working-directory: core
        run: |
          echo "$VAULT" | base64 -d > vars/vault.yaml
          echo "$SSH_KEY" | base64 -d > id_ed25519
          chmod 500 id_ed25519
          ansible-galaxy collection install -r requirements.yaml
          echo "$VAULT_PASS" | ansible-playbook -i inventory/inventory.yaml core-playbook.yaml -J
      - name: Cleanup repository
        if: always()
        run: |
          rm -rf "$GITHUB_WORKSPACE"/*
