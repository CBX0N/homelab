metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: proxmox-auto
spec:
  autoprovision:
    providerid: proxmox
    providerdata: |
      cores: 4
      sockets: 1
      memory: 8192
      disk_size: 20
      storage_selector: name == "local-lvm"
      node: pve
      disk_ssd: true
      vlan: 0
      cpu_type: host