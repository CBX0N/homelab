services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: media_gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file: wireguard.env
    networks:
      - caddy_net

  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - 992   
    environment:
      - DISPATCHARR_ENV=aio
      - REDIS_HOST=localhost
      - CELERY_BROKER_URL=redis://localhost:6379/0
      - DISPATCHARR_LOG_LEVEL=info
    volumes:
      - dispatcharr_data:/data
      - /data/backups/dispatcharr:/data/backups
    network_mode: "service:gluetun"

  jellyfin:
    image: docker.io/jellyfin/jellyfin
    container_name: jellyfin
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - 992   
    environment:
      - JELLYFIN_PublishedServerUrl=http://jellyfin.cbxon.co.uk
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /data/tv:/tv:ro
      - /data/movies:/movies:ro
      - /data/backups/jellyfin:/config/data/backups
    ports:
      - 8096:8096
    networks:
      - caddy_net

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    restart: unless-stopped
    environment:
      - LOG_LEVEL=debug
      # - TZ=Asia/Tashkent
      - PORT=5055
    volumes:
      - seerr_config:/app/config
    networks:
      - caddy_net

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - sonarr_config:/config
      - /data/tv:/tv
      - /data/backups/sonarr:/config/Backups
      # - /path/to/downloadclient-downloads:/downloads #optional
    networks:
      - caddy_net

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - radarr_config:/config
      - /data/movies:/movies
      - /data/backups/radarr:/config/Backups
      # - /path/to/download-client-downloads:/downloads #optional
    networks:
      - caddy_net

volumes:
  dispatcharr_data:
  jellyfin_config:
  jellyfin_cache:
  sonarr_config:
  radarr_config:
  seerr_config:

networks:
  caddy_net:
    name: infra_caddy_net
    external: true
