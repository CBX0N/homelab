apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: default
spec:
  install:
    createNamespace: true
  targetNamespace: metallb-system
  interval: 10m
  chart:
    spec:
      chart: metallb
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: default
      interval: 10m
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1
              kind: Namespace
              name: metallb-system
            patch: |
              - op: add
                path: /metadata/labels/pod-security.kubernetes.io~1enforce
                value: privileged
              - op: add
                path: /metadata/labels/pod-security.kubernetes.io~1audit
                value: privileged
              - op: add
                path: /metadata/labels/pod-security.kubernetes.io~1warn
                value: privileged
